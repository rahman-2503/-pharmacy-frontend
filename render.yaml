services:
  - type: web
    name: pharmacy-frontend
    runtime: static
    repo: https://github.com/rahman-2503/-pharmacy-frontend
    branch: main
    buildCommand: npm install && npm run build
    staticPublishPath: dist/pharmacare/browser
    envVars:
      - key: NODE_VERSION
        value: 22.22.3
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
